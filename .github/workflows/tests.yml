name: Playwright Tests

# when to run — on every push and every pull request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest    # GitHub's Linux server

    steps:
      # Step 1 — download your code onto the server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3 — install your Python packages
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4 — install Playwright browsers + Linux dependencies
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # Step 5 — run your tests
      - name: Run tests
        run: python -m pytest -m smoke -v --html=report.html
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          USER_EMAIL:     ${{ secrets.USER_EMAIL }}
          USER_PASSWORD:  ${{ secrets.USER_PASSWORD }}

      # Step 6 — upload report even if tests fail
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.html